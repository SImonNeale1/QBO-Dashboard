<script>
// ── Helpers ────────────────────────────────────────────────────────────────
let cfg = { company:'My Company', currency:'£', pl:true, bs:true, adj:true, inv:true, cust:true, chart:true, varGbp:true, varPct:true, varColor:true, mgmt:true };
function loadCfg() { try { const s=localStorage.getItem('fin_cfg'); if(s) cfg={...cfg,...JSON.parse(s)}; } catch(e){} }
function saveCfg() {
  cfg.company=document.getElementById('cfg-company').value||'My Company';
  cfg.currency=document.getElementById('cfg-currency').value||'£';
  ['pl','bs','adj','inv','cust','chart'].forEach(k=>cfg[k]=document.getElementById('cfg-'+k).checked);
  cfg.varGbp=document.getElementById('cfg-var-gbp').checked;
  cfg.varPct=document.getElementById('cfg-var-pct').checked;
  cfg.varColor=document.getElementById('cfg-var-color').checked;
  cfg.mgmt=document.getElementById('cfg-mgmt').checked;
  try { localStorage.setItem('fin_cfg',JSON.stringify(cfg)); } catch(e){}
  applyCfg();
}
function fmt(n){if(n==null||isNaN(n))return'—';const s=n<0?'-':'';const abs=Math.abs(n);return s+(cfg.currency||'£')+abs.toLocaleString();}

// ── Auth ───────────────────────────────────────────────────────────────────
function getToken(){return localStorage.getItem('auth_token')||sessionStorage.getItem('auth_token');}
function saveToken(t,r){r?localStorage.setItem('auth_token',t):sessionStorage.setItem('auth_token',t);}
function clearToken(){localStorage.removeItem('auth_token');sessionStorage.removeItem('auth_token');}

// ✅ ✅ FIXED apiFetch (THIS IS THE IMPORTANT PART)
async function apiFetch(path) {
  try {
    const token = getToken();

    if (!token) {
      console.error('❌ No token found');
      showLogin();
      return null;
    }

    let url;
    if (path.startsWith('/api/')) {
      url = path;
    } else if (path.startsWith('/')) {
      url = '/api' + path;
    } else {
      url = '/api/' + path;
    }

    console.log('➡️ API CALL:', url);

    const r = await fetch(url, {
      headers: {
        'x-auth-token': token
      }
    });

    if (r.status === 401) {
      console.warn('⚠️ Not logged in');
      showLogin();
      return null;
    }

    const text = await r.text();

    if (!r.ok) {
      console.error('❌ API ERROR:', text);
      return null;
    }

    try {
      return JSON.parse(text);
    } catch {
      console.warn('Non JSON response:', text);
      return null;
    }

  } catch (e) {
    console.error('FETCH ERROR:', e);
    return null;
  }
}

// ── Session ────────────────────────────────────────────────────────────────
async function checkSession(){
  const token=getToken();
  if(!token){showLogin();return;}
  try{
    const r=await fetch('/users/me',{headers:{'x-auth-token':token}});
    if(r.ok){showDashboard();return;}
  }catch(e){}
  clearToken();showLogin();
}

function showLogin(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('dashboard').style.display='none';
}
